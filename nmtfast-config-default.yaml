kafka:
  enabled: false
  bootstrap_servers:
    - localhost:29092
  security_protocol: PLAINTEXT
  group_id: nmt-fastapi-reference
  topics:
    - nmtfast-widgets

logging:
  level: DEBUG
  loggers:
    "aiosqlite":
      level: INFO
    "pymongo":
      level: INFO
    "httpcore":
      level: INFO
    "aiokafka":
      level: INFO
    "sse_starlette.sse":
      level: INFO
    "app.layers.service.v1.health":
      level: INFO
  # NOTE: these determine what will be logged as the client IP address; the
  #   first header that matches will be used, so order matters!
  client_host_headers: []
    #- X-Real-IP
    #- X-Forwarded-For

tasks:
  name: nmt-fastapi-reference
  backend: sqlite
  sqlite_filename: ./huey.sqlite
