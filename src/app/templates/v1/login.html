<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50:  '#fff7ed',
                            100: '#ffedd5',
                            200: '#fed7aa',
                            300: '#fdba74',
                            400: '#fb923c',
                            500: '#f97316',
                            600: '#ea580c',
                        },
                    },
                },
            },
        }
    </script>
</head>
<body class="min-h-screen bg-stone-50 flex items-center justify-center px-4">

    <div class="w-full max-w-md">
        <!-- Logo / App Name -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2 text-brand-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
                <span class="text-3xl font-bold text-stone-800">{{ app_name }}</span>
            </div>
        </div>

        <!-- Sign In Card -->
        <div class="bg-white rounded-xl shadow-sm border border-stone-200 p-8">
            <h1 class="text-2xl font-bold text-stone-800 mb-6">Sign In</h1>

            {% if error %}
            <div class="mb-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
                {{ error }}
            </div>
            {% endif %}

            <div class="space-y-3">
                <a href="/ui/v1/auth/login"
                   class="flex items-center justify-center gap-3 w-full px-4 py-3
                          border border-stone-300 rounded-lg text-stone-700
                          font-medium hover:bg-stone-50 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-stone-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    Continue with SSO
                </a>
            </div>

            <div class="mt-6 pt-6 border-t border-stone-200 text-center text-sm text-stone-500">
                Authentication is handled by your organization's identity provider.
            </div>
        </div>
    </div>

</body>
</html>
