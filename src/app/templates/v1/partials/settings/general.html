<div class="space-y-6">

    <div>
        <h3 class="text-lg font-bold text-stone-800">General</h3>
        <p class="text-sm text-stone-500 mt-1">Manage your personal preferences</p>
    </div>

    {% if success_message %}
    <div class="p-3 rounded-lg bg-emerald-50 border border-emerald-200 text-emerald-700 text-sm">
        {{ success_message }}
    </div>
    {% endif %}

    {% if error_message %}
    <div class="p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
        {{ error_message }}
    </div>
    {% endif %}

    <form hx-post="/ui/v1/settings/general"
          hx-target="#settings-content"
          hx-swap="innerHTML"
          class="space-y-5 max-w-md">

        <!-- Display Name -->
        <div>
            <label for="display_name" class="block text-sm font-medium text-stone-700 mb-1">
                Display Name
            </label>
            <input type="text"
                   id="display_name"
                   name="display_name"
                   value="{{ preferences.display_name }}"
                   placeholder="Your display name"
                   class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm text-stone-800 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent">
        </div>

        <!-- Timezone -->
        <div>
            <label for="timezone" class="block text-sm font-medium text-stone-700 mb-1">
                Timezone
            </label>
            <select id="timezone"
                    name="timezone"
                    class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm text-stone-800 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent">
                <option value="" {% if not preferences.timezone %}selected{% endif %}>Select a timezone</option>
                {% for tz in timezones %}
                <option value="{{ tz }}" {% if preferences.timezone == tz %}selected{% endif %}>{{ tz }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Items per page -->
        <div>
            <label for="page_size" class="block text-sm font-medium text-stone-700 mb-1">
                Items per page
            </label>
            <select id="page_size"
                    name="page_size"
                    class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm text-stone-800 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent">
                {% for size in [10, 50, 100, 500, 1000, 5000] %}
                <option value="{{ size }}" {% if preferences.page_size == size %}selected{% endif %}>{{ size }}</option>
                {% endfor %}
            </select>
            <p class="text-xs text-stone-400 mt-1">Default number of items shown in list views</p>
        </div>

        <!-- Submit -->
        <div class="flex items-center gap-3">
            <button type="submit"
                    class="bg-brand-500 hover:bg-brand-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors cursor-pointer inline-flex items-center gap-2">
                <svg id="settings-spinner" class="htmx-indicator h-4 w-4 animate-spin text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                </svg>
                Save Changes
            </button>
        </div>

    </form>

</div>
